<!DOCTYPE html>
<html lang="tr" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title data-i18n="loginPageTitle">Açıl Susam — Giriş</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 56px 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .login-brand-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      box-shadow: 0 0 0 1px rgba(232, 33, 39, 0.25);
    }
    .logo {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo span { color: #e82127; }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-google:hover { background: #f0f0f0; }
    .btn-google:active { transform: scale(0.98); }

    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .error-box {
      background: #2a0a0a;
      border: 1px solid #e82127;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #ff6b6b;
      display: none;
    }

    .info {
      margin-top: 28px;
      color: #444;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .theater-hint {
      margin-top: 24px;
      padding: 14px;
      background: #1a1a1a;
      border-radius: 10px;
      font-size: 12px;
      color: #555;
    }
    .theater-hint code {
      color: #888;
      font-size: 11px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="login-brand">
      <img class="login-brand-icon" src="/favicon.svg" width="72" height="72" alt="">
      <div class="logo">AÇIL<span>SUSAM</span></div>
    </div>
    <p class="subtitle" data-i18n="loginSubtitle">Seyahat halinde kesintisiz yayın</p>

    <div class="error-box" id="errorBox"></div>

    <a href="/auth/google" class="btn-google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span data-i18n="loginGoogleBtn">Google ile Giriş Yap</span>
    </a>

    <p class="info" data-i18n="loginInfo">Giriş yaparak üyeliğinizi aktifleştirin.
Hesabınız yoksa otomatik olarak oluşturulur.</p>

    <div class="theater-hint">
      <strong style="color:#666" data-i18n="loginTheaterBold">Araç tam ekran / tiyatro modu için:</strong><br>
      <code id="theaterUrl"></code>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const langParam = params.get('lang');
    let lang = (langParam && /^[a-z]{2}$/i.test(langParam)) ? langParam.toLowerCase() : null;
    if (!lang) {
      try {
        lang = localStorage.getItem('acil_susam_lang');
      } catch (e) {
        if (typeof console !== 'undefined' && console.warn) console.warn('[login] localStorage', e.message);
      }
    }
    if (window.AppI18n) {
      AppI18n.setLanguage(lang || 'tr');
      AppI18n.applyStatic(document);
    }

    const errKey = params.get('error');
    const errI18n = {
      google_denied: 'loginErrGoogleDenied',
      account_suspended: 'loginErrAccountSuspended',
      membership_inactive: 'loginErrMembership',
      server_error: 'loginErrServer',
      ip_locked: 'loginErrIpLocked',
    };
    const i18nErr = errKey && errI18n[errKey] && window.AppI18n ? AppI18n.t(errI18n[errKey]) : '';
    if (i18nErr) {
      const box = document.getElementById('errorBox');
      box.textContent = i18nErr;
      box.style.display = 'block';
    }

    document.getElementById('theaterUrl').textContent =
      `youtube.com/redirect?q=${location.origin}/theater`;
  </script>
</body>
</html>
