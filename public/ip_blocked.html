<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Erişim Engellendi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      text-align: center; padding: 48px 36px; max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #e82127; margin-bottom: 12px; font-size: 22px; }
    p { color: #888; font-size: 14px; line-height: 1.7; }
    .btn {
      display: inline-block; margin-top: 28px; padding: 14px 28px;
      background: #e82127; color: #fff; border-radius: 10px;
      text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Erişim Engellendi</h1>
    <p>
      Bu hesap farklı bir konumdan veya cihazdan kullanılıyor.<br><br>
      Her kullanıcı hesabı yalnızca tek bir lokasyondan kullanılabilir.
      IP adresinizi sıfırlamak için üyelik sahibiyle iletişime geçin.
    </p>
    <a href="/login.html" class="btn">Giriş Sayfasına Dön</a>
  </div>
</body>
</html>
